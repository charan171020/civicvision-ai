<!DOCTYPE html>
<html>
<head>
  <title>Report Issue - CivicVision AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
  <div class="logo">CivicVision <span>AI</span></div>
  <div>
    <a href="dashboard.html" class="btn-outline">Dashboard</a>
    <button onclick="logoutUser()" class="btn-outline">Logout</button>
  </div>
</header>

<section style="padding:40px 8%;">
  <div class="glass-card">

    <h2>Report Civic Issue</h2>

    <!-- ============================ -->
    <!-- LIVE CAMERA SECTION -->
    <!-- ============================ -->

    <div style="margin-bottom:20px;">

      <video id="camera"
             autoplay
             playsinline
             style="width:100%; border-radius:12px; display:none;"></video>

      <canvas id="canvas" style="display:none;"></canvas>

      <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" class="btn-outline" onclick="startCamera()">Start Camera</button>
        <button type="button" class="btn-outline" onclick="capturePhoto()">Capture</button>
      </div>

    </div>

    <!-- ============================ -->
    <!-- FILE UPLOAD OPTION -->
    <!-- ============================ -->

    <input type="file"
           id="imageInput"
           class="input"
           accept="image/*">

    <!-- ============================ -->
    <!-- DESCRIPTION -->
    <!-- ============================ -->

    <textarea id="description"
              class="input"
              placeholder="Describe the issue clearly..."
              style="margin-top:15px;"></textarea>

    <!-- ============================ -->
    <!-- AI RESULT DISPLAY -->
    <!-- ============================ -->

    <div id="aiResult" style="margin:15px 0;"></div>

    <!-- ============================ -->
    <!-- SUBMIT BUTTON -->
    <!-- ============================ -->

    <button type="button"
            class="btn-glow large"
            onclick="submitReport()">
      Submit Report
    </button>

  </div>
</section>

<!-- ============================ -->
<!-- SCRIPTS -->
<!-- ============================ -->

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/upload.js"></script>

<script>
  protectPage();
</script>

</body>
</html>
